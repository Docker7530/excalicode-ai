spring.application.name=excalicode-ai-platform
# \u670D\u52A1\u5668\u914D\u7F6E
server.port=9527
# \u6587\u4EF6\u4E0A\u4F20\u914D\u7F6E
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# AI \u914D\u7F6E
spring.ai.openai.base-url=https://api.siliconflow.cn
spring.ai.openai.api-key=${SILICONFLOW_API_KEY}
spring.ai.openai.chat.options.model=deepseek-ai/DeepSeek-V3.1
# Jackson JSON \u5168\u5C40\u914D\u7F6E
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=GMT+8
spring.jackson.locale=zh_CN
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
# Jackson \u5E8F\u5217\u5316\u914D\u7F6E
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false
spring.jackson.serialization.fail-on-empty-beans=false
# Jackson \u53CD\u5E8F\u5217\u5316\u914D\u7F6E
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.accept-empty-string-as-null-object=true
# MySQL \u6570\u636E\u6E90\u914D\u7F6E
# \u654F\u611F\u4FE1\u606F\u901A\u8FC7\u73AF\u5883\u53D8\u91CF\u914D\u7F6E\uFF0C\u907F\u514D\u6CC4\u9732\u5230 git
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:excalicode_ai}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
# HikariCP \u8FDE\u63A5\u6C60\u914D\u7F6E (Spring Boot \u9ED8\u8BA4\u8FDE\u63A5\u6C60\uFF0C\u6027\u80FD\u6700\u4F18)
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
# MyBatis-Plus \u914D\u7F6E
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.excalicode.platform.*.entity
# JWT \u914D\u7F6E\uFF08\u4ECE\u73AF\u5883\u53D8\u91CF\u8BFB\u53D6\uFF09
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
